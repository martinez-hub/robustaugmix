model:
  name: wrn50_2

dataset:
  name: cifar10
  data_root: ./data
  cifar10c_root: ./data/CIFAR-10-C

augment:
  severity: 3
  augmix_width: 3
  augmix_depth: -1
  alpha: 1.0
  all_ops: true

train:
  method: vanilla
  epochs: 100
  batch_size: 128
  lr: 0.1
  min_lr: 0.0
  scheduler: cosine
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0005
  jsd_weight: 12.0
  max_steps: 0

eval:
  corruption_severities: [1, 2, 3, 4, 5]
  adversarial_attack:
    epsilons: [0.25, 0.5, 1.0, 2.0, 4.0, 8.0]
    num_steps: 10
    step_size_mode: proportional
    step_size_factor: 0.35714285714285715
    pixel_scale: 1.0
    random_start: true

system:
  num_workers: 2
  persistent_workers: true
  prefetch_factor: 2
  device: cuda
  seed: 0

output:
  root: results

reproduce:
  methods: [vanilla, adversarial, augmix, robustaugmix]
  tolerance: 2.0
  paper_targets: {}
